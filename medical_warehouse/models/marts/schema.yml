version: 2
models:
  - name: dim_channels
    description: Dimension table for Telegram channels.
    columns:
      - name: channel_key
        description: Surrogate key for each channel.
        tests: [unique, not_null]
      - name: channel_name
        description: Name of the Telegram channel.
        tests: [not_null]
      - name: channel_type
        description: Category of the channel.
  - name: dim_dates
    description: Date dimension derived from message dates.
    columns:
      - name: date_key
        description: Surrogate key for each calendar date.
        tests: [unique, not_null]
      - name: full_date
        description: Calendar date.
        tests: [not_null]
  - name: fct_messages
    description: Fact table containing Telegram message metrics.
    columns:
      - name: message_id
        description: Telegram message identifier.
        tests: [unique, not_null]
      - name: channel_key
        description: Foreign key to dim_channels.
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: Foreign key to dim_dates.
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: views
        description: Number of message views.
        tests: [not_null]
  - name: fct_image_detections
    description: Image detection results joined to message facts.
    columns:
      - name: message_id
        description: Telegram message identifier.
      - name: channel_key
        description: Foreign key to dim_channels.
      - name: date_key
        description: Foreign key to dim_dates.
      - name: image_category
        description: Categorized image label.
      - name: confidence_score
        description: YOLO confidence score.
